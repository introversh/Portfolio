<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio : Shivankar</title>
    <link href="styles.css" rel="stylesheet" />
  </head>
  <body>
    <div class="starry-night"></div>
    <div class="home">
      <div class="container">
        <div class="pfp">
          <img src="images/pfp.jpg" />
        </div>
        <div class="name">
          <h1>Shivankar Tripathi</h1>
          <h3>I'm <span class="type"></span></h3>
        </div>
        <div class="socials">
          <div class="stile">
            <a
              href="https://www.github.com/introversh"
              target="_blank"
              rel="noopener noreferrer"
              ><img src="images/gh.png"
            /></a>
          </div>
          <div class="stile">
            <a href="https://www.instagram.com/introversh" target="_blank"
              ><img src="images/ig.png"
            /></a>
          </div>
          <div class="stile">
            <a href="https://www.linkedin.com/in/introversh/" target="_blank"
              ><img src="images/li.png"
            /></a>
          </div>
          <div class="stile">
            <a href="https://www.x.com/introversh" target="_blank"
              ><img src="images/x.png"
            /></a>
          </div>
          <a href="res.pdf" download class="resume-btn">Download Resume</a>
        </div>
        <div class="projects">
          <a
            href="https://github.com/introversh/React-Portfolio"
            target="_blank"
            rel="noopener noreferrer"
            ><div class="pjtile">
              <img src="images/port.png" />
              <h3>React Portfolio</h3>
            </div></a
          >
          <a href="https://github.com/introversh/portfolio" target="_blank" rel="noopener noreferrer"
            ><div class="pjtile">
              <img src="images/login.jpg" />
              <h3>Full Stack Portfolio</h3>
            </div></a
          >
          <a href="#" target="_blank" rel="noopener noreferrer"
            ><div class="pjtile">
              <img src="images/tdl.png" />
              <h3>To Do List</h3>
            </div></a
          >
          <a
            href="https://github.com/introversh/weatheria"
            target="_blank"
            rel="noopener noreferrer"
            ><div class="pjtile">
              <img src="images/weatheria.png" />
              <h3>Weatheria</h3>
            </div></a
          >
        </div>
      </div>
      <div class="contact">
        <input type="submit" class="contactBtn" value="Contact Me" />
      </div>
    </div>
    <form class="container" id="contactContainer">
        <h1 class="title">Send me a message!</h1>
    
        <div class="inputDiv">
            <input type="text" class="naam" name="name" placeholder="Enter your name" required />
        </div>
    
        <div class="inputDiv">
            <input type="email" class="email" name="email" placeholder="Enter your email" required />
        </div>
    
        <div class="inputDiv">
            <textarea class="message" name="message" placeholder="Enter your message" required></textarea>
        </div>
    
        <div class="submitBtnDiv">
            <button type="submit" class="submitBtn">Send</button>
        </div>
    </form>
    
    <script src="https://cdn.jsdelivr.net/npm/typed.js@2.0.12"></script>
    <script src="script.js"></script>
  </body>
</html>
